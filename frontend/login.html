<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d6efd" />
  <title>Acceso · Insumos QMC</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main id="app" class="login-wrap">
    <h1>Control de Insumos</h1>
    <p class="subtitulo">Laboratorio de Química — UAJMS</p>

    <form id="login-form" class="card" autocomplete="off">
      <label for="usuario">Usuario</label>
      <input id="usuario" name="usuario" type="text" required autofocus />

      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" required />

      <p id="login-error" class="error" role="alert"></p>

      <button type="submit" class="btn-primario">Ingresar</button>
    </form>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
