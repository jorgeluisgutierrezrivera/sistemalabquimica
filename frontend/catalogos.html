<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d6efd" />
  <link rel="manifest" href="manifest.json" />
  <title>Catálogos - Insumos QMC</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="btn-secundario" aria-label="Volver">‹ Inicio</a>
    <span id="sesion-info">Catálogos</span>
    <button id="logout" class="btn-secundario" type="button">Salir</button>
  </header>

  <main id="app" class="vista-ancha">
    <h1>Catálogos Base</h1>

    <!-- Pestañas Docentes / Materias / Ambientes -->
    <nav class="tabs" role="tablist">
      <button class="tab activa" data-tab="docentes" role="tab" type="button">Docentes</button>
      <button class="tab" data-tab="materias" role="tab" type="button">Materias</button>
      <button class="tab" data-tab="ambientes" role="tab" type="button">Ambientes</button>
    </nav>

    <div class="barra-acciones">
      <input id="buscador" class="input-busqueda" type="search" placeholder="Buscar…" />
      <button id="btn-nuevo" class="btn-primario btn-compacto" type="button">+ Nuevo</button>
    </div>

    <p id="mensaje" class="mensaje" role="status"></p>

    <ul id="lista" class="lista-insumos"></ul>
  </main>

  <!-- Modal de alta/edición -->
  <div id="modal" class="modal oculto" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 id="modal-titulo">Nuevo</h2>
      <form id="form" class="card">
        <input type="hidden" id="f-id" />

        <!-- Materias: sigla -->
        <div class="campo-materia">
          <label for="f-sigla">Sigla *</label>
          <input id="f-sigla" type="text" maxlength="30" placeholder="Ej: QMC021" />
        </div>

        <label for="f-nombre" id="lbl-nombre">Nombre *</label>
        <input id="f-nombre" type="text" maxlength="120" required />

        <!-- Materias: carrera -->
        <div class="campo-materia">
          <label for="f-carrera">Carrera *</label>
          <input id="f-carrera" type="text" maxlength="120" placeholder="Ej: ING. QUÍMICA" />
        </div>

        <p id="form-error" class="error"></p>

        <div class="modal-botones">
          <button type="button" id="btn-cancelar" class="btn-secundario">Cancelar</button>
          <button type="submit" class="btn-primario btn-compacto">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/catalogos.js"></script>
</body>
</html>
